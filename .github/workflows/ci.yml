name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Test (unit, fake LLM)
        env:
          LLM_PROVIDER: fake
          UIGP_API_KEY: dev-key
          DOMAIN_STRICT: "true"
        run: |
          go test ./... -v
