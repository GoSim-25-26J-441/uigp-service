<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200">
  <!-- Simple labels your parser will pick up -->
  <text x="100" y="60" font-size="20">Orders</text>
  <text x="400" y="60" font-size="20">Payments</text>

  <!-- A visible arrow (your current parser ignores edges, but keeps notes) -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" />
    </marker>
  </defs>
  <line x1="120" y1="70" x2="380" y2="70" stroke="black" stroke-width="2" marker-end="url(#arrow)" class="arrow grpc"/>
</svg>
